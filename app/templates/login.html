<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCSHAU :: LOGIN</title>
    <style>
        :root {
            --primary-color: #0d47a1;
            --secondary-color: #1976d2;
            --bg-color: #f0f2f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card img {
            width: 150px;
            margin-bottom: 20px;
        }
        .login-card h2 {
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 1.5em;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: var(--secondary-color);
        }
        .footer-text {
            margin-top: 20px;
            font-size: 0.85em;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="CCSHAU Logo">
        <div style="font-family: 'Times New Roman', Times, serif; font-size: 20px; font-weight: bold; color: var(--primary-color); margin-bottom: 5px;">
            CCS Haryana Agricultural University
        </div>
        <div style="font-size: 14px; font-weight: bold; color: #666; margin-bottom: 25px; text-transform: uppercase; border-bottom: 1px solid #ddd; padding-bottom: 10px;">
            Pre Admission Portal
        </div>
        <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label for="username">User Name</label>
                <input type="text" id="username" name="username" required placeholder="Enter username" style="width: 100%;">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password" style="width: 100%; border: 1px solid #ccc; padding: 10px;">
            </div>
            <button type="submit" class="btn btn-save" style="width: 100%; padding: 12px; margin-top: 10px;">LOGIN</button>
        </form>
        <div class="footer-text">
            &copy; 2026 CCSHAU. All rights reserved.
        </div>
    </div>
</body>
</html>
