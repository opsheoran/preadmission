{% extends "base_candidate.html" %}

{% block content %}
<style>
    /* =========================================================
       ULTRA-PREMIUM FORM STYLING
       ========================================================= */
    :root {
        --theme-primary: #1e3a8a;
        --theme-secondary: #2563eb;
        --theme-accent: #f59e0b;
        --theme-bg: #f8fafc;
        --theme-surface: #ffffff;
        --theme-text-main: #1e293b;
        --theme-text-muted: #64748b;
        --theme-border: #e2e8f0;
        --theme-error: #ef4444;
        --theme-success: #10b981;
    }

    body { background-color: var(--theme-bg); }

    .premium-container { 
        padding: 40px 20px; 
        max-width: 1280px; 
        margin: 0 auto; 
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }
    
    .premium-card {
        background: var(--theme-surface); 
        border: 1px solid rgba(226, 232, 240, 0.8);
        border-radius: 16px;
        box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05); 
        padding: 45px 50px;
        position: relative;
        overflow: hidden;
    }

    /* Decorative top accent line */
    .premium-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, var(--theme-primary), var(--theme-secondary), var(--theme-accent));
    }
    
    .page-title-wrapper {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 40px;
        padding-bottom: 20px;
        border-bottom: 2px solid var(--theme-border);
    }

    .step-badge {
        background: rgba(37, 99, 235, 0.1);
        color: var(--theme-secondary);
        padding: 8px 16px;
        border-radius: 30px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.5px;
        text-transform: uppercase;
    }

    .page-title {
        font-size: 28px; 
        color: var(--theme-text-main); 
        font-weight: 800;
        margin: 0;
        letter-spacing: -0.5px;
    }

    /* Section Styling */
    .section-header {
        display: flex;
        align-items: center;
        margin: 45px 0 25px;
    }

    .section-header h3 {
        font-size: 16px; 
        font-weight: 700; 
        color: var(--theme-primary);
        margin: 0;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .section-header::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--theme-border);
        margin-left: 20px;
    }

    /* Responsive Grid */
    .smart-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
        gap: 24px 32px; 
    }

    /* Input Groups */
    .input-group { 
        display: flex;
        flex-direction: column;
        position: relative;
    }

    .input-label { 
        display: flex;
        align-items: center;
        margin-bottom: 8px; 
        font-weight: 600; 
        color: var(--theme-text-main); 
        font-size: 13px; 
    }

    .required-star { 
        color: var(--theme-error); 
        margin-left: 4px; 
        font-weight: bold;
    }

    /* Controls */
    .premium-input {
        width: 100%; 
        height: 48px; 
        padding: 0 16px; 
        border: 2px solid var(--theme-border);
        border-radius: 8px; 
        background-color: var(--theme-surface); 
        font-size: 14px;
        font-weight: 500;
        color: var(--theme-text-main);
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
        box-shadow: 0 1px 2px rgba(0,0,0,0.02);
    }

    .premium-input::placeholder { color: #a1a1aa; font-weight: 400; }

    .premium-input:hover:not(:disabled) {
        border-color: #cbd5e1;
    }

    .premium-input:focus {
        border-color: var(--theme-secondary); 
        outline: none; 
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        background-color: #fff;
    }

    .premium-input:disabled, .premium-input[readonly] { 
        background-color: #f1f5f9; 
        color: var(--theme-text-muted); 
        cursor: not-allowed; 
        border-color: var(--theme-border);
    }

        /* Standard Custom Radio Buttons (Checkbox style) */
    .radio-group {
        display: flex;
        gap: 24px;
        align-items: center;
        height: 48px;
        padding: 0 16px;
        border: 2px solid var(--theme-border);
        border-radius: 8px;
        background: var(--theme-surface);
        transition: border-color 0.25s;
    }
    
    .radio-group:hover { border-color: #cbd5e1; }

    .radio-group label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        cursor: pointer;
        font-weight: 500;
        font-size: 14px;
        color: var(--theme-text-main);
    }

    .radio-group input[type="radio"] {
        appearance: none;
        -webkit-appearance: none;
        width: 20px;
        height: 20px;
        border: 2px solid #cbd5e1;
        border-radius: 4px; /* Square checkbox style */
        margin: 0;
        display: grid;
        place-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .radio-group input[type="radio"]::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 2px;
        transform: scale(0);
        background-color: var(--theme-secondary);
        transition: 0.2s transform ease-in-out;
    }

    .radio-group input[type="radio"]:checked {
        border-color: var(--theme-secondary);
    }

    .radio-group input[type="radio"]:checked::before {
        transform: scale(1);
    }

    /* File Upload Styling */
    .file-upload-wrapper {
        border: 2px dashed #cbd5e1;
        border-radius: 8px;
        padding: 15px;
        text-align: center;
        background: #f8fafc;
        transition: all 0.2s ease;
        cursor: pointer;
    }
    .file-upload-wrapper:hover {
        border-color: var(--theme-secondary);
        background: #eff6ff;
    }
    .file-upload-wrapper input[type="file"] {
        display: none;
    }
    .file-upload-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--theme-secondary);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
    }
    .file-upload-label svg { width: 24px; height: 24px; }

    /* Action Bar */
    .action-bar {
        margin-top: 50px; 
        padding-top: 30px; 
        border-top: 1px solid var(--theme-border);
        display: flex; 
        justify-content: space-between; 
        align-items: center;
    }

    .btn-epic { 
        padding: 14px 32px; 
        font-size: 14px; 
        font-weight: 700; 
        text-transform: uppercase; 
        letter-spacing: 1px; 
        border-radius: 8px; 
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border: none;
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }

    .btn-epic-primary {
        background: linear-gradient(135deg, var(--theme-primary), var(--theme-secondary));
        color: white; 
        box-shadow: 0 6px 15px rgba(37, 99, 235, 0.25);
    }
    .btn-epic-primary:hover { 
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
    }

    .btn-epic-secondary {
        background: var(--theme-surface);
        color: var(--theme-text-main);
        border: 2px solid var(--theme-border);
        text-decoration: none;
    }
    .btn-epic-secondary:hover {
        background: #f1f5f9;
        border-color: #cbd5e1;
    }
    
    /* Dynamic field animation */
    .dynamic-field {
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        transition: all 0.4s ease;
    }
    .dynamic-field.show {
        max-height: 200px;
        opacity: 1;
        margin-top: 10px;
    }
</style>

<div class="premium-container">
    <div class="premium-card">
        
        <div class="page-title-wrapper">
            <span class="step-badge">Step 4</span>
            <h2 class="page-title">Additional Information</h2>
        </div>

        <form method="POST" action="{{ url_for('main.candidate_additional_info') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <div class="section-header"><h3>Other Information</h3></div>
            <div class="smart-grid">
                
                <div class="input-group">
                    <label class="input-label">Are you Ex-Student of HAU? <span class="required-star">*</span></label>
                    <div class="radio-group">
                        <input type="radio" id="ex_y" name="is_ex_student" value="Y" {{ 'checked' if add_info and add_info.Ex_Student == 'Y' else '' }} required>
                        <label for="ex_y">Yes</label>
                        <input type="radio" id="ex_n" name="is_ex_student" value="N" {{ 'checked' if add_info and add_info.Ex_Student == 'N' else '' }} required>
                        <label for="ex_n">No</label>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Any other Information <span class="required-star">*</span></label>
                    <div class="radio-group">
                        <input type="radio" id="other_y" name="any_other_info" value="Y" {{ 'checked' if add_info and add_info.ReleventStatus == 'Y' else '' }} required onchange="toggleOtherInfo()">
                        <label for="other_y">Yes</label>
                        <input type="radio" id="other_n" name="any_other_info" value="N" {{ 'checked' if not add_info or add_info.ReleventStatus == 'N' else '' }} required onchange="toggleOtherInfo()">
                        <label for="other_n">No</label>
                    </div>
                </div>

                <div class="input-group dynamic-field" id="other_info_div">
                    <label class="input-label">Please Specify <span class="required-star">*</span></label>
                    <input type="text" class="premium-input" name="other_info_text" id="other_info_text" value="{{ add_info.OtherInformation if add_info else '' }}" placeholder="Enter details">
                </div>

                <div class="input-group">
                    <label class="input-label">Are you Rural/Urban ? <span class="required-star">*</span></label>
                    <div class="radio-group">
                        <input type="radio" id="ru_r" name="rural_urban" value="R" {{ 'checked' if add_info and add_info.RuralOrUrban == 'R' else '' }} required>
                        <label for="ru_r">Rural</label>
                        <input type="radio" id="ru_u" name="rural_urban" value="U" {{ 'checked' if add_info and add_info.RuralOrUrban == 'U' else '' }} required>
                        <label for="ru_u">Urban</label>
                    </div>
                </div>

            </div>

            <div class="action-bar">
                <a href="{{ url_for('main.candidate_dashboard') }}" class="btn-epic btn-epic-secondary">
                    <svg style="width:18px;height:18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Dashboard
                </a>
                <button type="submit" class="btn-epic btn-epic-primary">
                    Save & Continue
                    <svg style="width:18px;height:18px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleOtherInfo() {
        var isYes = document.getElementById('other_y').checked;
        var div = document.getElementById('other_info_div');
        var txt = document.getElementById('other_info_text');
        if (isYes) {
            div.classList.add('show');
            txt.required = true;
        } else {
            div.classList.remove('show');
            txt.required = false;
            txt.value = '';
        }
    }
    
    document.addEventListener("DOMContentLoaded", function() {
        toggleOtherInfo();
    });
</script>
{% endblock %}
